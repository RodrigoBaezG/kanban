services:
  - type: web
    name: kanban
    runtime: static
    buildCommand: cd frontend && npm install -g pnpm && pnpm install && pnpm run build
    staticPublishPath: ./frontend/out
    pullRequestPreviewsEnabled: false
    headers:
      - path: /index.html
        name: Cache-Control
        value: no-cache, no-store, must-revalidate
      - path: /board/index.html
        name: Cache-Control
        value: no-cache, no-store, must-revalidate
